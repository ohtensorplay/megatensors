name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing version tag to release
        required: true
        type: string

concurrency:
  group: release-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.package.outputs.tag }}
      version: ${{ steps.package.outputs.version }}
      prerelease: ${{ steps.package.outputs.prerelease }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.11"

      - name: Match tag to package version
        id: package
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          package_version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          expected_tag="v${package_version}"
          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "Tag $RELEASE_TAG does not match pyproject.toml version $package_version" >&2
            exit 1
          fi
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          if [[ "$package_version" =~ (a|b|rc|dev)[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require a commit from main
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.package.outputs.tag }}
        run: |
          git fetch origin main
          tag_sha=$(git rev-list -n 1 "$RELEASE_TAG")
          if ! git merge-base --is-ancestor "$tag_sha" origin/main; then
            echo "Release tag must point to a commit reachable from main" >&2
            exit 1
          fi

  plan:
    name: Plan missing artifacts
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      wheel_count: ${{ steps.plan.outputs.wheel_count }}
      build_sdist: ${{ steps.plan.outputs.build_sdist }}
      has_staged_assets: ${{ steps.plan.outputs.has_staged_assets }}
    steps:
      - name: Find artifacts that still need to be built
        id: plan
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          PACKAGE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          staged_assets=$(gh api \
            "repos/$GITHUB_REPOSITORY/releases" \
            --paginate \
            --jq ".[] | select(.tag_name == \"$RELEASE_TAG\") | .assets[].name")
          STAGED_ASSETS="$staged_assets" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          platforms = [
              {"arch": "x86_64", "runner": "ubuntu-latest", "build": "manylinux_x86_64", "cibw_arch": "x86_64"},
              {"arch": "aarch64", "runner": "ubuntu-24.04-arm", "build": "manylinux_aarch64", "cibw_arch": "aarch64"},
              {"arch": "win_amd64", "runner": "windows-latest", "build": "win_amd64", "cibw_arch": "AMD64"},
          ]
          staged = set(os.environ.get("STAGED_ASSETS", "").splitlines())
          package_version = os.environ["PACKAGE_VERSION"]
          known = set()
          for filename in staged:
              if filename == f"megatensors-{package_version}.tar.gz":
                  known.add("sdist")
              if not filename.startswith(f"megatensors-{package_version}-") or not filename.endswith(".whl"):
                  continue
              for python_version in ("cp310", "cp311", "cp312", "cp313", "cp314"):
                  if f"-{python_version}-{python_version}-" not in filename:
                      continue
                  if filename.endswith("-win_amd64.whl"):
                      known.add(f"wheels-{python_version}-win_amd64")
                  elif filename.endswith("_aarch64.whl"):
                      known.add(f"wheels-{python_version}-aarch64")
                  elif filename.endswith("_x86_64.whl"):
                      known.add(f"wheels-{python_version}-x86_64")

          missing = []
          for python_version in ("cp310", "cp311", "cp312", "cp313", "cp314"):
              for platform in platforms:
                  artifact = f"wheels-{python_version}-{platform['arch']}"
                  if artifact not in known:
                      missing.append({"python_version": python_version, **platform})

          print(f"matrix={json.dumps({'include': missing}, separators=(',', ':'))}")
          print(f"wheel_count={len(missing)}")
          print(f"build_sdist={str('sdist' not in known).lower()}")
          print(f"has_staged_assets={str(bool(staged)).lower()}")
          PY

  build-wheels:
    name: Wheel ${{ matrix.python_version }} / ${{ matrix.arch }}
    needs: [validate, plan]
    if: needs.plan.outputs.wheel_count != '0'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.11"

      - name: Update VC++ redistributable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { throw "Visual Studio installation not found" }
          $redist = Get-ChildItem "$vs\VC\Redist\MSVC" -Recurse -Filter vc_redist.x64.exe |
            Sort-Object { $_.VersionInfo.FileVersionRaw } | Select-Object -Last 1
          if (-not $redist) { throw "vc_redist.x64.exe not found under $vs" }
          $process = Start-Process -FilePath $redist.FullName -ArgumentList '/install','/quiet','/norestart' -Wait -PassThru
          if ($process.ExitCode -notin 0, 1638, 3010) {
            throw "vc_redist.x64.exe exited with $($process.ExitCode)"
          }

      - name: Install wheel builder
        run: python -m pip install --upgrade cibuildwheel setuptools pybind11

      - name: Build and smoke-test wheel
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "${{ matrix.python_version }}-${{ matrix.build }}"
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          CIBW_ARCHS: "${{ matrix.cibw_arch }}"
          CIBW_BEFORE_ALL_LINUX: "dnf install -y openssl-devel libzstd-devel"
          CIBW_BEFORE_ALL_WINDOWS: "vcpkg install zstd:x64-windows"
          CIBW_ENVIRONMENT: "CMAKE_ARGS=-DMEGATENSORS_NATIVE_OPT=OFF"
          CIBW_ENVIRONMENT_WINDOWS: "CMAKE_ARGS='-DMEGATENSORS_NATIVE_OPT=OFF -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake' CL='/IC:/vcpkg/installed/x64-windows/include /DNOMINMAX /EHsc'"
          CIBW_TEST_COMMAND: "python {project}/tests/smoke_import_cpp.py"
          CIBW_BEFORE_BUILD_WINDOWS: "pip install delvewheel"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair --add-path C:/Windows/System32;C:/vcpkg/installed/x64-windows/bin -w {dest_dir} {wheel}"
          CIBW_TEST_REQUIRES_WINDOWS: pefile
          CIBW_TEST_COMMAND_WINDOWS: "python {project}/tests/dump_pyd_imports.py && python {project}/tests/smoke_import_cpp.py"

      - name: Upload wheel
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-${{ matrix.python_version }}-${{ matrix.arch }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    name: Source distribution
    needs: [validate, plan]
    if: needs.plan.outputs.build_sdist == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: python -m pip install --upgrade build "packaging>=24.2" twine

      - name: Build source distribution
        run: python -m build --sdist --outdir dist

      - name: Validate package metadata
        run: python -m twine check --strict dist/*

      - name: Upload source distribution
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  assemble:
    name: Verify release artifacts
    needs: [validate, plan, build-wheels, build-sdist]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.plan.result == 'success' &&
      (needs.build-wheels.result == 'success' || needs.build-wheels.result == 'skipped') &&
      (needs.build-sdist.result == 'success' || needs.build-sdist.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download staged release artifacts
        if: needs.plan.outputs.has_staged_assets == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern '*.whl' \
            --pattern '*.tar.gz' \
            --dir dist

      - name: Download newly built wheels
        if: needs.plan.outputs.wheel_count != '0'
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download newly built source distribution
        if: needs.plan.outputs.build_sdist == 'true'
        uses: actions/download-artifact@v8.0.1
        with:
          name: sdist
          path: dist

      - name: Verify artifact set
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          wheel_count=$(find dist -maxdepth 1 -type f -name '*.whl' | wc -l)
          sdist_count=$(find dist -maxdepth 1 -type f -name '*.tar.gz' | wc -l)
          if [[ "$wheel_count" -ne 15 || "$sdist_count" -ne 1 ]]; then
            echo "Expected 15 wheels and 1 sdist; found $wheel_count wheels and $sdist_count sdist" >&2
            find dist -maxdepth 1 -type f -print
            exit 1
          fi
          unexpected_wheels=$(find dist -maxdepth 1 -type f -name '*.whl' ! -name "megatensors-${PACKAGE_VERSION}-*.whl" | wc -l)
          expected_sdist="dist/megatensors-${PACKAGE_VERSION}.tar.gz"
          if [[ "$unexpected_wheels" -ne 0 || ! -f "$expected_sdist" ]]; then
            echo "Reused artifacts do not match megatensors $PACKAGE_VERSION" >&2
            find dist -maxdepth 1 -type f -print
            exit 1
          fi
          python -m pip install --upgrade "packaging>=24.2" twine
          python -m twine check --strict dist/*

      - name: Upload verified release artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: [validate, assemble]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.assemble.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/megatensors/${{ needs.validate.outputs.version }}/
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-dist
          path: dist

      - name: Publish with PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/
          attestations: true
          print-hash: true

  github-release:
    name: Create GitHub Release
    needs: [validate, assemble, publish-pypi]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.assemble.result == 'success' &&
      needs.publish-pypi.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-dist
          path: dist

      - name: Create release and attach distributions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ needs.validate.outputs.prerelease }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          release_args=(--verify-tag --generate-notes --title "$RELEASE_TAG")
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          fi
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            existing_assets=$(gh release view "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets[].name')
            for file in dist/*; do
              asset_name=${file##*/}
              if ! grep -Fxq "$asset_name" <<< "$existing_assets"; then
                gh release upload "$RELEASE_TAG" "$file" --repo "$GITHUB_REPOSITORY"
              fi
            done
            edit_args=(--draft=false --title "$RELEASE_TAG")
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              edit_args+=(--prerelease)
            else
              edit_args+=(--latest)
            fi
            gh release edit "$RELEASE_TAG" "${edit_args[@]}" --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" dist/* "${release_args[@]}" --repo "$GITHUB_REPOSITORY"
          fi
